# Security Audit Configuration
# Safety patterns and intercept rules

[version]
current = "1.0.0"
last_updated = "2026-03-09"

[intercept_patterns]
# Level 5: Maximum Security (御坂妹妹 17 号专用)
delete_operations = ["rm -rf", "rm --no-preserve=root", "rm -rf /home", "rm -rf /root", "rm -rf /etc", "rm -rf /var"]
git_danger = ["git reset --hard", "git push --force", "git branch -D", "git clean -fdx"]
filesystem_danger = ["dd if=", "mkfs", "fdisk", "parted", "chmod 000", "chown -R root:root"]
data_destruction = ["truncate -s 0", "> /dev/sd", "> /dev/mmcblk", "echo > /etc/passwd", "echo > /etc/shadow"]
network_attack = ["iptables -F", "systemctl disable", "service stop"]
format_danger = ["format", "wipe", "erase"]

[allowed_operations]
# Safe operations that don't require approval
safe_delete = "trash"
safe_git = "add, commit, push (normal), pull"
safe_system = "ls, cd, cat, head, tail, grep, find (read-only)"

[approval_required]
# Operations that need human confirmation
require_approval = ["rm -rf", "rm --no-preserve", "dd", "mkfs", "fdisk", "format", "erase", "wipe"]

[alert_format]
title = "⚠️ 安全拦截警报 - 御坂妹妹 17 号"
sections = ["命令详情", "风险分析", "可能影响", "替代方案", "审批请求"]

[logging]
log_file = "memory/security-audit.log"
log_format = "YYYY-MM-DD HH:MM:SS - [LEVEL] - [ACTION] - [COMMAND] - [RESULT]"
